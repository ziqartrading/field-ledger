<!DOCTYPE html>
<html lang="ps" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' data: blob:; frame-src https://script.google.com https://script.googleusercontent.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com; worker-src 'self' blob:; manifest-src 'self'; form-action 'self'; upgrade-insecure-requests">

<meta name="field-ledger-app" content="Field Ledger">
<meta name="field-ledger-version" content="3.1.0">
<meta name="field-ledger-schema" content="10">
<meta name="field-ledger-build" content="2026-07-13-google-pwa">
<title>Field Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Caveat:wght@600&family=Spline+Sans+Mono:wght@500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="manifest" href="./_r/m.webmanifest">
<meta name="theme-color" content="#2f5dd0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Field Ledger">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="field-ledger-online-package" content="google-apps-script-pwa">
<link rel="stylesheet" href="./_r/u.css">
</head>
<body>

<div class="login" id="loginScreen">
  <div class="login-card">
    <div class="login-brand"><div class="mark">F</div><div><h1>Field Ledger</h1><div class="sub" data-i18n="sub"></div></div></div>
    <h2 data-i18n="signInTitle"></h2>
    <div class="field"><label data-i18n="username"></label><input id="loginUser" autocomplete="username"></div>
    <div class="field"><label data-i18n="password"></label><input id="loginPass" type="password" autocomplete="current-password"></div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn btn-primary login-btn" id="loginBtn" data-i18n="signIn"></button>
    <div class="login-demo" id="loginDemo"></div>
    <div class="login-lang"><button id="loginLangBtn"></button></div>
  </div>
</div>

<header>
  <div class="brand" id="brandHome" tabindex="0"><div class="mark">F</div><div><h1>Field Ledger</h1><div class="sub" data-i18n="sub"></div></div></div>
  <div class="spacer"></div>
  <button class="icon-btn" id="activityBtn" data-perm="viewActivity" data-title="activity"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/></svg></button>
  <button class="icon-btn" id="usersBtn" data-perm="manageUsers" data-title="users"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="3.5"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.5a4 4 0 010 7.75"/></svg></button>
  <button class="lang-btn" id="langBtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"/></svg><span id="langLabel"></span></button>
  <div class="theme-switch">
    <button id="lightBtn" class="on" data-title="light"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/></svg></button>
    <button id="darkBtn" data-title="dark"><svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg></button>
  </div>
  <button class="btn btn-primary" id="newBookBtn" data-perm="ledgerBooks"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span class="lbl" data-i18n="newBook"></span></button>
  <div class="usercluster">
    <button class="userchip" id="userChip" style="position:relative"><span class="uava" id="uava"></span><span class="uname" id="uname"></span><span class="chip-badge" id="chipBadge"></span></button>
    <div class="usermenu" id="userMenu">
      <div class="um-head"><b id="umName"></b><span class="rolebadge" id="umRole"></span></div>
      <button class="um-item" id="umAdmin" data-i18n="adminPanel"></button>
      <button class="um-item" id="umActivity" data-perm="viewActivity" data-i18n="activity"></button>
      <button class="um-item" id="umUsers" data-perm="manageUsers" data-i18n="users"></button>
      <button class="um-item" id="umTrash" data-perm="viewTrash" data-i18n="trash"></button>
      <button class="um-item danger" id="umSignout" data-i18n="signOut"></button>
    </div>
  </div>
</header>

<main>
  <section class="view active" id="libraryView">
    <div class="lib-head"><button class="back" data-home style="margin-bottom:10px"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span data-i18n="back"></span></button><div class="eyebrow" id="libEyebrow" data-i18n="amanat"></div><h2 data-i18n="libTitle"></h2><div class="count" id="libCount"></div></div>
    <div class="toolbar">
      <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="libSearch" data-ph="searchBooks"></div>
      <div class="select-wrap"><select id="sortSel">
        <option value="modified" data-i18n="sortModified"></option>
        <option value="created" data-i18n="sortCreated"></option>
        <option value="name" data-i18n="sortName"></option>
        <option value="pages" data-i18n="sortPages"></option></select></div>
      <div class="select-wrap"><select id="filterSel">
        <option value="all" data-i18n="filterAll"></option>
        <option value="active" data-i18n="filterActive"></option>
        <option value="new" data-i18n="filterNew"></option></select></div>
    </div>
    <div class="grid" id="bookGrid"></div>
  </section>

  <section class="view" id="readerView">
    <div class="reader-bar">
      <button class="back" id="backBtn"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span data-i18n="library"></span></button>
      <div class="reader-title"><div class="rt" id="readerTitle"></div><div class="rc" id="readerCount"></div></div>
      <div class="reader-tools">
        <button class="btn btn-ghost reader-index-btn" id="indexBtn" data-title="bookIndex"><svg viewBox="0 0 24 24"><path d="M5 4h14v16H5z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg><span class="idx-label" data-i18n="bookIndex"></span></button>
        <div class="psearch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="pageSearch" data-ph="searchPages" autocomplete="off"><div class="results" id="pageResults" style="display:none"></div></div>
        <div class="jump"><label data-i18n="goTo"></label><input id="jumpInput" type="number" min="1" placeholder="#"><button id="jumpBtn" data-i18n="jump"></button></div>
      </div>
    </div>
    <div class="stage">
      <div class="pagesheet" id="pageSheet">
        <div class="stack-tabs" id="stackTabs" aria-label="attached pages"></div>
        <div class="pageface" id="pageFace"></div>
        <button class="note-peek" id="notePeek" aria-label="notes"><svg viewBox="0 0 24 24"><path d="M4 4h16v12l-4 4H4z"/><path d="M16 20v-4h4"/></svg><span class="np-count" id="npCount">0</span></button>
        <button class="ref-peek" id="refPeek" aria-label="reference"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-4 4 3 4-4 5 4"/><circle cx="8.5" cy="8.5" r="1.5"/></svg><span class="np-count" id="rpCount">0</span></button>
      </div>
    </div>
    <div class="reader-dock">
      <div class="nav-row">
        <button class="nav-btn" id="firstBtn" data-title="first"><svg viewBox="0 0 24 24"><path d="M18 17l-5-5 5-5M11 17l-5-5 5-5"/></svg></button>
        <button class="nav-btn" id="prevBtn" data-title="prev"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="pageind" id="pageInd"></div>
        <button class="nav-btn" id="nextBtn" data-title="next"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
        <button class="nav-btn" id="lastBtn" data-title="last"><svg viewBox="0 0 24 24"><path d="M6 17l5-5-5-5M13 17l5-5-5-5"/></svg></button>
      </div>
      <div class="page-edit">
        <button class="mini" id="addPageBtn" data-i18n="newPage"></button>
        <button class="mini" id="addStackPageBtn" data-i18n="addStackPage"></button>
        <button class="ledger-btn add" id="txnAddBtn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span data-i18n="addTxn"></span></button>
        <button class="ledger-btn ded" id="txnDedBtn"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg><span data-i18n="deductTxn"></span></button>
        <button class="mini" id="notePageBtn" data-i18n="noteBtn"></button>
        <button class="mini" id="renamePageBtn" data-i18n="editAttachedPage"></button>
        <button class="mini danger" id="deletePageBtn" data-i18n="delPage"></button>
      </div>
    </div>
  </section>

  <section class="view" id="activityView">
    <div class="reader-bar">
      <button class="back" id="actBack"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span data-i18n="backLib"></span></button>
      <div class="reader-title"><div class="rt" data-i18n="activityTitle"></div><div class="rc" data-i18n="activitySub"></div></div>
    </div>
    <div class="activity-wrap">
      <div class="activity-summary" id="activitySummary"></div>
      <div class="activity-toolbar">
        <div class="search act-search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg><input id="actSearch" data-ph="activitySearch" autocomplete="off"></div>
        <div class="act-period" id="actPeriod">
          <button class="on" data-ap="all" data-i18n="allTime"></button>
          <button data-ap="today" data-i18n="todayLbl"></button>
          <button data-ap="7" data-i18n="last7"></button>
          <button data-ap="30" data-i18n="last30"></button>
        </div>
        <div class="select-wrap"><select class="act-select" id="actYear"></select></div>
        <div class="select-wrap"><select class="act-select" id="actMonth"></select></div>
        <button class="btn btn-ghost act-sort" id="actSort"></button>
      </div>
      <div class="log-list" id="logList"></div>
    </div>
  </section>

  <section class="view" id="usersView">
    <div class="reader-bar">
      <button class="back" id="usrBack"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span data-i18n="backLib"></span></button>
      <div class="reader-title"><div class="rt" data-i18n="usersTitle"></div><div class="rc" data-i18n="usersSub"></div></div>
      <button class="btn btn-primary" id="newAcctBtn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span class="lbl" data-i18n="newAccount"></span></button>
    </div>
    <div class="user-grid" id="userGrid"></div>
  </section>

  <section class="view" id="homeView">
    <div class="home-wrap">
      <div class="home-eyebrow" data-i18n="appHome"></div>
      <div class="home-grid">
        <button class="home-btn" data-go="hawala" data-perm="accessHawala"><span class="hb-ic"><svg viewBox="0 0 24 24"><path d="M7 7h11l-3-3M17 17H6l3 3"/></svg></span><span class="hb-t" data-i18n="hawala"></span><span class="hb-d" data-i18n="hawalaDesc"></span></button>
        <button class="home-btn" data-go="amanat" data-perm="accessAmanat"><span class="hb-ic"><svg viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 016.5 3H20v15H6.5A2.5 2.5 0 004 20.5zM4 20.5A2.5 2.5 0 016.5 18H20v3H6.5A2.5 2.5 0 014 20.5z"/></svg></span><span class="hb-t" data-i18n="amanat"></span><span class="hb-d" data-i18n="amanatDesc"></span></button>
        <button class="home-btn" data-go="hisab" data-perm="accessHisab"><span class="hb-ic"><svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h4"/></svg></span><span class="hb-t" data-i18n="hisab"></span><span class="hb-d" data-i18n="hisabDesc"></span></button>
        <button class="home-btn" data-go="notes" data-perm="accessNotes"><span class="hb-ic"><svg viewBox="0 0 24 24"><path d="M4 4h16v12l-4 4H4z"/><path d="M16 20v-4h4"/><path d="M8 9h8M8 13h5"/></svg></span><span class="hb-t" data-i18n="notesHome"></span><span class="hb-d" data-i18n="notesHomeDesc"></span></button>
        <button class="home-btn" data-go="stock" data-perm="accessStock"><span class="hb-ic"><svg viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5v8l9 5 9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/></svg></span><span class="hb-t" data-i18n="stock"></span><span class="hb-d" data-i18n="stockDesc"></span></button>
        <button class="home-btn" data-go="sales" data-perm="accessSales"><span class="hb-ic"><svg viewBox="0 0 24 24"><path d="M3 17l5-6 4 3 6-8"/><path d="M14 6h4v4"/><path d="M3 21h18"/></svg></span><span class="hb-t" data-i18n="salesT"></span><span class="hb-d" data-i18n="salesDesc"></span></button>
        <button class="home-btn dash-tile" data-go="dash" data-perm="accessDashboard"><span class="hb-ic"><svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg></span><span class="hb-t" data-i18n="dashT"></span><span class="hb-d" data-i18n="dashDesc"></span></button>
      </div>
    </div>
  </section>

  <section class="view" id="hawalaHomeView">
    <div class="reader-bar"><button class="back" data-home><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span data-i18n="back"></span></button>
      <div class="reader-title"><div class="rt" data-i18n="hawala"></div><div class="rc" data-i18n="hawalaDesc"></div></div></div>
    <div class="two-grid">
      <button class="big-tile" id="btnNewHawala" data-perm="hawalaCreate"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><b data-i18n="newHawala"></b></button>
      <button class="big-tile" id="btnManageHawala"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg><b data-i18n="manageHawala"></b></button>
      <button class="big-tile" id="btnHawalaAccounting"><svg viewBox="0 0 24 24"><path d="M4 3h16v18H4z"/><path d="M4 8h16M9 8v13M15 8v13M4 13h16M4 17h16"/></svg><b data-i18n="hawalaAccounting"></b></button>
      <button class="big-tile" id="btnHawalaNotes"><svg viewBox="0 0 24 24"><path d="M4 4h16v12l-4 4H4z"/><path d="M16 20v-4h4"/><path d="M8 9h8M8 13h5"/></svg><b data-i18n="hawalaNotes"></b></button>
    </div>
  </section>

  <section class="view" id="hawalaNewView">
    <div class="reader-bar"><button class="back" data-hawalahome><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span data-i18n="hawala"></span></button>
      <div class="reader-title"><div class="rt" data-i18n="newHawala"></div><div class="rc mono" id="hwIdShow"></div></div></div>
    <div class="hw-form">
      <button class="btn btn-primary photo-top" id="takePhotoBtn"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg><span data-i18n="takePhotoBtn"></span></button>
      <div class="hw-row2">
        <div class="field"><label data-i18n="hawalaId"></label><input id="hwId" readonly class="mono"></div>
        <div class="field"><label data-i18n="dateLbl"></label><input id="hwDate" type="date"></div>
      </div>
      <div class="hawala-flow-note" data-i18n="hawalaFlowHint"></div>
      <div class="hw-entry-grid">
        <div class="field hw-customer-name"><label data-i18n="giverName"></label><input id="hwSName" autocomplete="off"></div>
        <div class="field hw-receiver-name"><label data-i18n="receiverName"></label><input id="hwRName" autocomplete="off"></div>
        <div class="field hw-aed-amount"><label data-i18n="givingAmount"></label><div class="money-input"><input id="hwSNum" inputmode="decimal" autocomplete="off"><span class="money-code">AED</span></div></div>
        <div class="field hw-payout-amount"><label data-i18n="receivingAmount"></label><div class="money-input"><input id="hwRNum" inputmode="decimal" autocomplete="off"><span class="money-code" id="hwPayoutCode">—</span></div></div>
      </div>
      <div class="field">
        <label class="hw-field-label"><span data-i18n="receiverCurrency"></span></label>
        <div class="hw-currency" id="hwRCurrency">
          <button type="button" class="cur-btn" data-cur="PKR"><span data-i18n="currencyKaldari"></span><small>PKR</small></button>
          <button type="button" class="cur-btn" data-cur="AFN"><span data-i18n="currencyAfghani"></span><small>AFN</small></button>
        </div>
        <small class="required-note" data-i18n="currencyRequiredHint"></small>
      </div>
      <div class="hw-status">
        <button class="seg on" id="segUnpaid" data-i18n="unpaid"></button>
        <button class="seg" id="segPaid" data-i18n="paid"></button>
      </div>
      <div class="hw-save"><button class="btn btn-primary big" id="saveHawalaBtn" data-i18n="saveHawala"></button></div>
    </div>
  </section>

  <section class="view" id="hawalaManageView">
    <div class="reader-bar"><button class="back" data-hawalahome><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span data-i18n="hawala"></span></button>
      <div class="reader-title"><div class="rt" data-i18n="manageHawala"></div><div class="rc" id="hwCount"></div></div></div>
    <div class="hw-summary" id="hwSummary"></div>
    <div class="hw-summary hw-money-summary" id="hwMoneySummary" hidden></div>
    <div class="hw-date-tools">
      <div class="seg chips-seg" id="hwPeriodMode">
        <button class="seg-b on" data-hp="all" data-i18n="allTime"></button>
        <button class="seg-b" data-hp="today" data-i18n="todayLbl"></button>
        <button class="seg-b" data-hp="date" data-i18n="specificDate"></button>
        <button class="seg-b" data-hp="month" data-i18n="wholeMonth"></button>
        <button class="seg-b" data-hp="year" data-i18n="wholeYear"></button>
      </div>
      <div class="hw-date-inputs">
        <label class="hw-date-field" id="hwDateField"><span data-i18n="specificDate"></span><input type="date" id="hwDatePick"></label>
        <label class="hw-date-field" id="hwMonthField"><span data-i18n="wholeMonth"></span><input type="month" id="hwMonthPick"></label>
        <label class="hw-date-field" id="hwYearField"><span data-i18n="wholeYear"></span><select id="hwYearPick"></select></label>
        <select class="hw-sort-select" id="hwDateSort"><option value="new" data-i18n="activityNewest"></option><option value="old" data-i18n="activityOldest"></option></select>
      </div>
    </div>
    <div class="ctrl-bar">
      <div class="ctrl-search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg><input id="hwSearch" data-ph="searchHawalaPh"></div>
      <div class="seg chips-seg" id="hwViewMode">
        <button class="seg-b" data-v="list" title="List"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
        <button class="seg-b on" data-v="grid" title="Gallery"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
      </div>
    </div>
    <div id="hwManageList"></div>
  </section>

  <section class="view" id="hawalaAccountingLibraryView">
    <div class="lib-head ha-lib-head">
      <button class="back" data-hawalahome style="margin-bottom:10px"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span data-i18n="hawala"></span></button>
      <h2 data-i18n="hawalaAccounting"></h2>
      <div class="count" id="haLibCount"></div>
    </div>
    <div class="ha-library-content">
      <div class="grid ha-library-grid" id="haLibraryGrid">
        <div class="book" id="haOpenBook" tabindex="0" style="animation-delay:0ms">
          <div class="cover" style="background:linear-gradient(150deg,#2f5dd0,#1d3a86)">
            <div class="spine"></div>
            <div class="label"><div class="id">HB001</div><div class="t" data-i18n="hawalaBook"></div><div class="yr" id="haBookYear"></div></div>
            <div class="chip" id="haBookPageChip"></div>
          </div>
          <div class="book-meta"><div class="bt" data-i18n="hawalaBook"></div><div class="bd" id="haBookMeta"></div></div>
        </div>
      </div>
      <div class="home-grid ha-library-actions">
        <button class="home-btn" id="haOpenCalc" type="button">
          <span class="hb-ic"><svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h2m4 0h2M8 15h2m4 0h2M8 19h8"/></svg></span>
          <span class="hb-t" data-i18n="calculateHawala"></span>
          <span class="hb-d" data-i18n="calculateSelectedPagesDesc"></span>
        </button>
